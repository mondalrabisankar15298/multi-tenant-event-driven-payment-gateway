server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly — must come before SPA fallback
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin frontend calls /api/v1/consumers -> rewrite to /api/v1/admin/consumers
    location /api/v1/consumers {
        rewrite ^/api/v1/consumers(.*)$ /api/v1/admin/consumers$1 break;
        proxy_pass http://connect-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /api/v1/admin {
        proxy_pass http://connect-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /api/v1/oauth {
        proxy_pass http://connect-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /api/v1/third-party {
        proxy_pass http://connect-service:8002;
        proxy_set_header Host $host;
